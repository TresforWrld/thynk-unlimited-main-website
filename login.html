<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ANICADE TECH | Login</title>
<meta property="og:title" content="ANICADE TECH | Professional Tech Solutions Zambia">
<meta property="og:description" content="Kabwe's trusted partner for web development, digital marketing, AI automation and design.">
<meta property="og:image" content="https://i.imgur.com/RcBmjWM.png">
<meta property="og:url" content="https://bit.ly/ANICADEtech">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://i.imgur.com/RcBmjWM.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B1C2D;--gold:#C6A85C;--cyan:#00BFFF;--green:#39ff14;--text:#F5F7FA;--muted:#94A3B8;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--red:#ff4d4d}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{display:flex;justify-content:center;align-items:center;font-family:'Rajdhani',sans-serif}

/* ── RINGS ── */
.scene{display:flex;justify-content:center;align-items:center;width:100vw;height:100vh}
.ring-wrap{width:min(500px,92vw);height:min(500px,92vw);position:relative;display:flex;justify-content:center;align-items:center}
.ring{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center}
.ring i{position:absolute;inset:0;border:2px solid transparent;transition:.5s}
.ring i:nth-child(1){border-radius:38% 62% 63% 37%/41% 44% 56% 59%;animation:spin1 6s linear infinite;border-color:rgba(0,191,255,0.18)}
.ring i:nth-child(2){border-radius:41% 44% 56% 59%/38% 62% 63% 37%;animation:spin1 4s linear infinite;border-color:rgba(198,168,92,0.14)}
.ring i:nth-child(3){border-radius:41% 44% 56% 59%/38% 62% 63% 37%;animation:spin2 10s linear infinite;border-color:rgba(0,191,255,0.09)}
.ring:hover i:nth-child(1){border:4px solid var(--cyan);filter:drop-shadow(0 0 16px var(--cyan))}
.ring:hover i:nth-child(2){border:4px solid var(--gold);filter:drop-shadow(0 0 16px var(--gold))}
.ring:hover i:nth-child(3){border:4px solid var(--gold);filter:drop-shadow(0 0 16px var(--gold))}
@keyframes spin1{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes spin2{0%{transform:rotate(360deg)}100%{transform:rotate(0deg)}}

/* ── CARD ── */
.login{position:absolute;width:min(290px,74vw);display:flex;justify-content:center;align-items:center;flex-direction:column;gap:13px;z-index:1000}
.login-logo{width:54px;height:54px;border-radius:50%;border:2px solid rgba(198,168,92,0.4);margin-bottom:2px}
.login h2{font-family:'Orbitron',sans-serif;font-size:clamp(1em,4.5vw,1.4em);color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;text-shadow:0 0 18px rgba(198,168,92,0.4);text-align:center}
.login-sub{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2.5px;color:var(--muted);text-align:center;text-transform:uppercase}

/* ── INPUTS ── */
.inputBx{width:100%}
.inputBx input[type=text],.inputBx input[type=password],.inputBx input[type=email]{
  width:100%;padding:11px 18px;background:rgba(255,255,255,0.04);
  border:1.5px solid var(--border);border-radius:40px;font-size:clamp(0.8em,3.5vw,0.95em);
  color:var(--text);outline:none;transition:.3s;font-family:'Rajdhani',sans-serif;font-weight:500
}
.inputBx input:focus{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,191,255,0.2);background:rgba(0,191,255,0.04)}
.inputBx input::placeholder{color:var(--muted)}

/* ── SUBMIT BTN ── */
.submit-btn{
  width:100%;padding:12px 18px;background:linear-gradient(135deg,var(--cyan),rgba(0,191,255,0.7));
  border:none;border-radius:40px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;color:var(--bg);cursor:pointer;transition:.3s;box-shadow:0 0 22px rgba(0,191,255,0.28)
}
.submit-btn:hover{background:linear-gradient(135deg,var(--gold),rgba(198,168,92,0.8));box-shadow:0 0 28px rgba(198,168,92,0.35);color:#fff}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── LINKS ── */
.links{width:100%;display:flex;justify-content:space-between;padding:0 8px}
.links a{color:var(--muted);text-decoration:none;font-size:clamp(0.72em,3vw,0.85em);transition:.3s;cursor:pointer;font-weight:500}
.links a:hover{color:var(--cyan);text-shadow:0 0 8px var(--cyan)}

/* ── MESSAGES ── */
.msg{font-size:clamp(0.72em,3vw,0.85em);min-height:16px;text-align:center;font-weight:600;transition:.3s}
.msg.error{color:var(--red)}
.msg.success{color:var(--green)}
.msg.info{color:var(--cyan)}

/* ── SPINNER ── */
.spin-wrap{display:none;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:11px;font-family:'Orbitron',sans-serif;letter-spacing:1.5px}
.spin-wrap.show{display:flex}
.spinner{width:16px;height:16px;border:2px solid rgba(0,191,255,0.15);border-top-color:var(--cyan);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.footer-bar{position:fixed;bottom:14px;left:0;right:0;text-align:center;z-index:9999;display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
.footer-bar a{color:rgba(148,163,184,0.5);font-size:12px;text-decoration:none;font-weight:600;letter-spacing:.5px}
.footer-bar a:hover{color:var(--cyan)}
.footer-bar .sep{color:rgba(255,255,255,0.15);font-size:12px}

/* ── DIVIDER ── */
.or-divider{display:flex;align-items:center;gap:10px;width:100%;opacity:.4}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.or-divider span{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--muted);white-space:nowrap}

/* ── APP INSTALL OVERLAY ── */
#install-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(5,12,22,0.94);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
#install-overlay.show{opacity:1;pointer-events:all}
.iov-box{
  background:rgba(11,28,45,0.99);
  border:1px solid rgba(198,168,92,0.22);
  border-radius:18px;padding:28px 22px 22px;
  max-width:292px;width:100%;text-align:center;
  transform:translateY(18px);
  transition:transform .3s ease;
}
#install-overlay.show .iov-box{transform:translateY(0)}
.iov-logo{width:66px;height:66px;border-radius:50%;border:2px solid rgba(198,168,92,0.35);margin:0 auto 14px;display:block}
.iov-a{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--gold);letter-spacing:2px;margin-bottom:2px}
.iov-sub{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:3px;color:var(--cyan);opacity:.7;text-transform:uppercase;margin-bottom:16px}
.iov-desc{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:22px}
.iov-desc strong{color:var(--text);display:block;margin-bottom:4px;font-size:14px}
.iov-pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.iov-pill{background:rgba(0,191,255,0.06);border:1px solid rgba(0,191,255,0.12);border-radius:20px;padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.iov-install{
  width:100%;background:linear-gradient(135deg,var(--cyan),#0077aa);
  color:#0B1C2D;border:none;padding:13px;border-radius:40px;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;cursor:pointer;margin-bottom:10px;
  box-shadow:0 0 24px rgba(0,191,255,0.25);
  transition:opacity .2s;
}
.iov-install:hover{opacity:.88}
.iov-skip{
  width:100%;background:none;
  border:1px solid rgba(255,255,255,0.07);
  color:rgba(148,163,184,0.45);padding:10px;border-radius:40px;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;letter-spacing:.5px;transition:color .2s;
}
.iov-skip:hover{color:var(--muted)}
</style>
</head>
<body>

<div class="scene">
  <div class="ring-wrap">
    <div class="ring">
      <i></i><i></i><i></i>
      <div class="login" id="loginContainer">
        <img class="login-logo" src="https://i.imgur.com/RcBmjWM.png" alt="ANICADE TECH">
        <h2 id="formTitle">Welcome Back</h2>
        <div class="login-sub">ANICADE TECH</div>

        <div class="spin-wrap" id="dbSpinner"><div class="spinner"></div>CONNECTING</div>
        <div class="msg" id="message"></div>

        <!-- Username -->
        <div class="inputBx">
          <input type="text" id="username" placeholder="Username" autocomplete="username" spellcheck="false">
        </div>

        <!-- Email (signup only) -->
        <div class="inputBx" id="emailBox" style="display:none">
          <input type="email" id="emailInput" placeholder="Email address" autocomplete="email">
        </div>

        <!-- Password -->
        <div class="inputBx">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        </div>

        <!-- Confirm password (signup only) -->
        <div class="inputBx" id="confirmBox" style="display:none">
          <input type="password" id="confirmPassword" placeholder="Confirm Password">
        </div>

        <button class="submit-btn" id="actionBtn" onclick="handleAuth()">SIGN IN</button>

        <div class="links">
          <a id="forgotLink" onclick="handleForgot()">Forgot Password?</a>
          <a id="toggleLink" onclick="toggleMode()">Sign Up</a>
        </div>

        <div class="msg success" id="successMessage"></div>
      </div>
    </div>
  </div>
</div>

<!-- APP INSTALL OVERLAY -->
<div id="install-overlay">
  <div class="iov-box">
    <img class="iov-logo" src="https://i.imgur.com/RcBmjWM.png" alt="ANICADE">
    <div class="iov-a">ANICADE</div>
    <div class="iov-sub">Tech App &nbsp;&#183;&nbsp; TW.1.0.0</div>
    <div class="iov-desc">
      <strong>Install the App</strong>
      Get faster access to all services, the Agent Portal and more — straight from your home screen.
    </div>
    <div class="iov-pills">
      <span class="iov-pill">31 Services</span>
      <span class="iov-pill">Agent Portal</span>
      <span class="iov-pill">Works Offline</span>
    </div>
    <button class="iov-install" id="iov-install-btn" onclick="doInstall()">INSTALL APP</button>
    <button class="iov-skip" onclick="skipInstall()">Maybe later &mdash; continue to site</button>
  </div>
</div>

<div class="footer-bar">
  <span style="opacity:.5">© 2026 ANICADE TECH</span>
  <span class="sep">·</span>
  <a href="terms.html">Terms of Use</a>
  <span class="sep">·</span>
  <a href="terms.html#privacy">Privacy Policy</a>
</div>

<script>
/* ══════════════════════════════════════════
   ANICADE TECH — Login / Signup
   DB: JSONBin (users bin)
   ══════════════════════════════════════════ */

const USERS_BIN_ID = '69b14c5bc3097a1dd5173665';
const API_KEY      = '$2a$10$VJXQzwtVgNhMTIJiiQvpy.hG7XaRD0.H42NyZhKzeLRungeekMmpO';
const USERS_URL    = `https://api.jsonbin.io/v3/b/${USERS_BIN_ID}`;
const REDIRECT_URL = 'https://tresforwrld.github.io/ANICADEtech.net-in/#';
const LOCAL_CACHE  = 'anicade_users_cache';

let _users = [];   // loaded from DB
let _dbReady = false;
let isLoginMode = true;

/* ── simple hash (not crypto — just obfuscation for a static site) ── */
function hashPw(str){
  let h=5381;
  for(let i=0;i<str.length;i++){h=((h<<5)+h)^str.charCodeAt(i);h|=0;}
  return(h>>>0).toString(16);
}

/* ── DB helpers ── */
async function dbLoad(){
  const r=await fetch(USERS_URL+'/latest',{headers:{'X-Master-Key':API_KEY}});
  const j=await r.json();
  return j.record?.users||[];
}
async function dbSave(users){
  await fetch(USERS_URL,{method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
    body:JSON.stringify({users})
  });
}

/* ── Init ── */
window.addEventListener('DOMContentLoaded',async()=>{
  // If already logged in, redirect
  const session=localStorage.getItem('anicade_session');
  if(session){try{const s=JSON.parse(session);if(s.username&&s.expires>Date.now()){window.location.href=getRedirect();return;}}catch{}}

  document.getElementById('dbSpinner').classList.add('show');
  try{
    _users=await dbLoad();
    localStorage.setItem(LOCAL_CACHE,JSON.stringify(_users));
    _dbReady=true;
  }catch(e){
    // Fall back to local cache
    try{_users=JSON.parse(localStorage.getItem(LOCAL_CACHE)||'[]');}catch{_users=[];}
    _dbReady=false;
    showMsg('Offline mode — some features limited','info');
  }
  document.getElementById('dbSpinner').classList.remove('show');
  document.getElementById('username').focus();
});

function getRedirect(){
  const p=localStorage.getItem('anicade_login_redirect');
  if(p){localStorage.removeItem('anicade_login_redirect');return p;}
  return REDIRECT_URL;
}

/* ── Mode toggle ── */
function toggleMode(){
  isLoginMode=!isLoginMode;
  const t=document.getElementById('formTitle');
  const btn=document.getElementById('actionBtn');
  const tog=document.getElementById('toggleLink');
  const forgot=document.getElementById('forgotLink');
  clearMsgs();
  if(isLoginMode){
    t.textContent='Welcome Back';btn.textContent='SIGN IN';tog.textContent='Sign Up';
    forgot.style.display='';
    document.getElementById('emailBox').style.display='none';
    document.getElementById('confirmBox').style.display='none';
  }else{
    t.textContent='Create Account';btn.textContent='CREATE ACCOUNT';tog.textContent='Sign In';
    forgot.style.display='none';
    document.getElementById('emailBox').style.display='';
    document.getElementById('confirmBox').style.display='';
  }
  ['username','emailInput','password','confirmPassword'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
}

/* ── Message helpers ── */
function showMsg(text,type='error'){
  const m=document.getElementById('message');m.textContent=text;m.className='msg '+type;
}
function clearMsgs(){
  document.getElementById('message').textContent='';
  document.getElementById('message').className='msg';
  document.getElementById('successMessage').textContent='';
}

/* ── Auth ── */
async function handleAuth(){
  clearMsgs();
  const username=document.getElementById('username').value.trim().toLowerCase();
  const password=document.getElementById('password').value;
  if(!username||!password){showMsg('Please fill in all fields.');return;}

  const btn=document.getElementById('actionBtn');
  btn.disabled=true;btn.textContent='PLEASE WAIT…';

  if(isLoginMode){
    await doLogin(username,password);
  }else{
    await doSignup(username,password);
  }
  btn.disabled=false;
  btn.textContent=isLoginMode?'SIGN IN':'CREATE ACCOUNT';
}

async function doLogin(username,password){
  const hashed=hashPw(password);
  // Try DB first, fallback to cache
  let users=_users;
  if(_dbReady){try{users=await dbLoad();_users=users;localStorage.setItem(LOCAL_CACHE,JSON.stringify(users));}catch{}}
  const user=users.find(u=>u.username===username);
  if(!user){showMsg('Username not found.');return;}
  if(user.banned){showMsg('This account has been suspended.');return;}
  if(user.password!==hashed){showMsg('Incorrect password.');return;}
  // Update last login
  user.lastLogin=Date.now();
  if(_dbReady){try{await dbSave(users);}catch{}}
  // Store session (24h)
  localStorage.setItem('anicade_session',JSON.stringify({username,displayName:user.displayName||username,expires:Date.now()+86400000}));
  document.getElementById('successMessage').textContent='Login successful!';
  showInstallPrompt();
}

async function doSignup(username,password){
  const email=document.getElementById('emailInput').value.trim().toLowerCase();
  const confirm=document.getElementById('confirmPassword').value;
  if(!email){showMsg('Please enter your email.');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('Please enter a valid email.');return;}
  if(password!==confirm){showMsg('Passwords do not match.');return;}
  if(password.length<6){showMsg('Password must be at least 6 characters.');return;}
  if(username.length<3){showMsg('Username must be at least 3 characters.');return;}
  if(!/^[a-z0-9_]+$/.test(username)){showMsg('Username: letters, numbers and _ only.');return;}

  let users=_users;
  if(_dbReady){try{users=await dbLoad();_users=users;}catch{}}
  if(users.find(u=>u.username===username)){showMsg('Username already taken.');return;}
  if(users.find(u=>u.email===email)){showMsg('Email already registered.');return;}

  const newUser={
    username,email,
    password:hashPw(password),
    displayName:username,
    joined:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),
    joinedTs:Date.now(),
    lastLogin:Date.now(),
    banned:false
  };
  users.push(newUser);

  if(_dbReady){
    try{
      await dbSave(users);
      _users=users;localStorage.setItem(LOCAL_CACHE,JSON.stringify(users));
    }catch(e){
      showMsg('Failed to save account. Check your connection.');return;
    }
  }else{
    localStorage.setItem(LOCAL_CACHE,JSON.stringify(users));
    _users=users;
  }

  localStorage.setItem('anicade_session',JSON.stringify({username,displayName:username,expires:Date.now()+86400000}));
  document.getElementById('successMessage').textContent='Account created!';
  showInstallPrompt();
}

function handleForgot(){
  const username=document.getElementById('username').value.trim().toLowerCase();
  if(!username){showMsg('Enter your username first, then tap Forgot Password.','info');return;}
  const user=_users.find(u=>u.username===username);
  if(!user){showMsg('Username not found.');return;}
  showMsg(`Email on record: ${user.email||'—'}. Contact support to reset your password.`,'info');
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});

/* ── APP INSTALL PROMPT ── */
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
});

function showInstallPrompt() {
  // If already running as installed PWA, just redirect
  if (window.matchMedia('(display-mode: standalone)').matches) {
    window.location.href = getRedirect();
    return;
  }
  // Show the overlay
  const ov = document.getElementById('install-overlay');
  ov.style.display = 'flex';
  setTimeout(() => ov.classList.add('show'), 10);
  // Update button text if no native prompt available (iOS / non-Chrome)
  if (!_deferredPrompt) {
    document.getElementById('iov-install-btn').textContent = 'OPEN IN CHROME TO INSTALL';
  }
}

function doInstall() {
  if (_deferredPrompt) {
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(choice => {
      _deferredPrompt = null;
      // Redirect regardless of choice
      setTimeout(() => { window.location.href = getRedirect(); }, 600);
    });
  } else {
    // No native prompt — just redirect
    skipInstall();
  }
}

function skipInstall() {
  const ov = document.getElementById('install-overlay');
  ov.classList.remove('show');
  setTimeout(() => { window.location.href = getRedirect(); }, 300);
}
</script>
</body>
</html>
